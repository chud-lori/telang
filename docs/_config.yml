title: Telang
description: Self-host object storage with Telegram as the disk (speaks S3 on the front)

# Project Pages live under https://chud-lori.github.io/telang/ — match the
# baseurl to the repo name. If you fork this under a different name, change
# this one line.
baseurl: "/telang"

# No Jekyll theme — we ship our own _layouts and _includes.
theme: null

markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    default_lang: shell

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: default
